<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iere Screensaver</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        :root {
            /* Default Cinematic Gradient */
            --bg-gradient: linear-gradient(-45deg, #ff5e62, #ff9966, #ffb347, #ffcc33);
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* Live Gradient Background */
        #gradient-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientFlow 15s ease infinite;
            z-index: 1;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Particle Canvas */
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Main Content Overlay */
        #content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #main-text {
            font-size: 3rem;
            font-weight: 300;
            color: var(--text-color);
            margin-bottom: 30px;
            letter-spacing: 4px;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            cursor: pointer; /* Added as fallback trigger */
        }

        #sub-text {
            font-size: 1.2rem;
            font-weight: 300;
            color: var(--text-color);
            margin-top: 20px;
            letter-spacing: 2px;
            opacity: 0.8;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        #logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        #logo, #custom-logo {
            max-width: 300px;
            width: 20vw;
            min-width: 150px;
            cursor: pointer;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #custom-logo {
            display: none; /* Hidden until uploaded */
            max-height: 200px;
            width: auto;
        }

        #logo:hover, #custom-logo:hover {
            transform: scale(1.05);
        }

        #logo:active, #custom-logo:active {
            transform: scale(0.95);
        }

        /* Fullscreen Button */
        #fullscreen-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #fullscreen-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: scale(1.1);
        }

        /* Settings Modal (Glassmorphism) */
        #settings-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 450px;
            max-height: 85vh; /* Allow scrolling if too tall */
            display: flex;
            flex-direction: column;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            color: white;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        #settings-modal.active {
            opacity: 1;
            pointer-events: all;
            transform: translate(-50%, -50%) scale(1);
        }

        .settings-header {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            flex-shrink: 0;
        }

        .settings-scroll-area {
            overflow-y: auto;
            padding-right: 15px;
            margin-bottom: 15px;
        }

        /* Custom Scrollbar for Settings */
        .settings-scroll-area::-webkit-scrollbar {
            width: 6px;
        }
        .settings-scroll-area::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .settings-scroll-area::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .setting-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .setting-group label {
            font-size: 0.9rem;
            color: #aaa;
        }

        input[type="text"], input[type="file"], select {
            width: 100%;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        
        input[type="file"] {
            font-size: 0.85rem;
            cursor: pointer;
        }

        input[type="text"]:focus, select:focus {
            border-color: #ffb347;
        }

        input[type="range"] {
            width: 100%;
            accent-color: #ff9966;
            cursor: pointer;
        }

        option {
            background: #222;
            color: white;
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-direction: row;
        }

        /* Custom Checkbox */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            transition: .4s;
            border-radius: 34px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: #ff9966;
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        #close-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #ff9966, #ff5e62);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            flex-shrink: 0;
            transition: opacity 0.3s;
        }

        #close-btn:hover {
            opacity: 0.9;
        }

        /* Color Picker row for Custom Gradient */
        .color-pickers {
            display: flex;
            gap: 10px;
            display: none;
        }
        .color-pickers.active {
            display: flex;
        }
        .color-pickers input[type="color"] {
            border: none;
            width: 100%;
            height: 40px;
            border-radius: 8px;
            background: none;
            cursor: pointer;
        }

        .mic-badge {
            font-size: 0.7rem;
            background: #ff5e62;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 10px;
            color: white;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div id="gradient-bg"></div>
    <canvas id="particles-canvas"></canvas>

    <div id="content-layer">
        <div id="main-text">PREMIUM VISUALS</div>
        <div id="logo-container">
            <img src="iere-logo.png" id="logo" alt="Main Logo">
            <img id="custom-logo" alt="Event Logo">
        </div>
        <div id="sub-text">Triple-click the logo for settings</div>
    </div>

    <button id="fullscreen-btn" title="Toggle Fullscreen">⛶</button>

    <!-- Settings Panel -->
    <div id="settings-modal">
        <div class="settings-header">Visual Settings</div>
        
        <div class="settings-scroll-area">
            <div class="setting-group">
                <label>Main Headline Text</label>
                <input type="text" id="input-main-text" value="PREMIUM VISUALS">
            </div>

            <div class="setting-group">
                <label>Sub-Headline Text</label>
                <input type="text" id="input-sub-text" value="Triple-click the logo for settings">
            </div>

            <!-- Logo Controls -->
            <div class="setting-group toggle-container">
                <label>Show Iere Logo</label>
                <label class="switch">
                    <input type="checkbox" id="logo-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-group">
                <label>Upload Event Logo</label>
                <input type="file" id="custom-logo-upload" accept="image/*">
            </div>

            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">

            <!-- Background Controls -->
            <div class="setting-group">
                <label>Gradient Direction</label>
                <select id="gradient-type-select">
                    <option value="linear">Linear (Sweeping)</option>
                    <option value="radial">Radial (Pulsing Center)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Cinematic Gradient</label>
                <select id="gradient-select">
                    <option value="#ff5e62, #ff9966, #ffb347, #ffcc33">Bocas Sunset (Warm)</option>
                    <option value="#00c6ff, #0072ff, #1cb5e0, #000046">Maracas Deep (Ocean)</option>
                    <option value="#8A2387, #E94057, #F27121">Scarlet Ibis (Vibrant)</option>
                    <option value="#232526, #414345, #0f2027, #203a43">Pitch Midnight (Dark)</option>
                    <option value="custom">Custom Colors...</option>
                </select>
            </div>

            <div class="setting-group color-pickers" id="custom-colors">
                <input type="color" id="color1" value="#ff5e62">
                <input type="color" id="color2" value="#ff9966">
            </div>

            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">

            <!-- Particle Controls -->
            <div class="setting-group toggle-container">
                <label>Live Particles</label>
                <label class="switch">
                    <input type="checkbox" id="particle-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-group">
                <label>Particle Density</label>
                <input type="range" id="particle-count" min="2000" max="20000" value="9000" step="1000">
            </div>

            <div class="setting-group">
                <label>Particle Base Speed</label>
                <input type="range" id="particle-speed" min="0.1" max="5" value="1" step="0.1">
            </div>

            <!-- Audio Reactivity -->
            <div class="setting-group toggle-container">
                <label>Audio Reactive <span class="mic-badge">Mic Required</span></label>
                <label class="switch">
                    <input type="checkbox" id="audio-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <button id="close-btn">Save & Close</button>
    </div>

    <script>
        // --- DOM Elements ---
        const logo = document.getElementById('logo');
        const customLogo = document.getElementById('custom-logo');
        const mainTextEl = document.getElementById('main-text');
        const settingsModal = document.getElementById('settings-modal');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const closeBtn = document.getElementById('close-btn');
        
        // Settings Inputs
        const inputMainText = document.getElementById('input-main-text');
        const inputSubText = document.getElementById('input-sub-text');
        const logoToggle = document.getElementById('logo-toggle');
        const customLogoUpload = document.getElementById('custom-logo-upload');
        const gradientTypeSelect = document.getElementById('gradient-type-select');
        const gradientSelect = document.getElementById('gradient-select');
        const customColorsContainer = document.getElementById('custom-colors');
        const color1 = document.getElementById('color1');
        const color2 = document.getElementById('color2');
        const root = document.documentElement;

        // Particle Inputs
        const particleToggle = document.getElementById('particle-toggle');
        const particleCountSlider = document.getElementById('particle-count');
        const particleSpeedSlider = document.getElementById('particle-speed');
        const audioToggle = document.getElementById('audio-toggle');

        // --- Triple Click Logic ---
        let clickCount = 0;
        let clickTimer;

        // Apply triple click to the logo, custom logo, AND the main text (as a fallback if logos are hidden)
        [logo, customLogo, mainTextEl].forEach(element => {
            element.addEventListener('click', () => {
                clickCount++;
                if (clickCount === 1) {
                    clickTimer = setTimeout(() => {
                        clickCount = 0;
                    }, 600); // 600ms window for triple click
                }
                if (clickCount === 3) {
                    clearTimeout(clickTimer);
                    clickCount = 0;
                    settingsModal.classList.add('active');
                }
            });
        });

        // --- Settings Logic ---
        closeBtn.addEventListener('click', () => {
            settingsModal.classList.remove('active');
        });

        // Text & Logo Live Updates
        inputMainText.addEventListener('input', (e) => mainTextEl.textContent = e.target.value);
        inputSubText.addEventListener('input', (e) => document.getElementById('sub-text').textContent = e.target.value);

        logoToggle.addEventListener('change', (e) => {
            logo.style.display = e.target.checked ? 'block' : 'none';
        });

        customLogoUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    customLogo.src = event.target.result;
                    customLogo.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Background Gradient Logic
        let currentColors = gradientSelect.value;
        let currentType = gradientTypeSelect.value;

        const updateGradient = () => {
            let colors = currentColors;
            if (colors === 'custom') {
                colors = `${color1.value}, ${color2.value}, ${color1.value}, ${color2.value}`;
            }
            const gradString = currentType === 'linear' 
                ? `linear-gradient(-45deg, ${colors})` 
                : `radial-gradient(circle at center, ${colors})`;
            
            root.style.setProperty('--bg-gradient', gradString);
        };

        gradientTypeSelect.addEventListener('change', (e) => {
            currentType = e.target.value;
            updateGradient();
        });

        gradientSelect.addEventListener('change', (e) => {
            currentColors = e.target.value;
            if (currentColors === 'custom') {
                customColorsContainer.classList.add('active');
            } else {
                customColorsContainer.classList.remove('active');
            }
            updateGradient();
        });

        color1.addEventListener('input', updateGradient);
        color2.addEventListener('input', updateGradient);

        // --- Fullscreen Logic ---
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        // --- Audio Reactivity Setup ---
        let audioContext, analyser, dataArray;
        let isAudioSetup = false;

        async function setupAudio() {
            if (isAudioSetup) {
                if (audioContext.state === 'suspended') audioContext.resume();
                return true;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256;
                const bufferLength = analyser.frequencyBinCount;
                dataArray = new Uint8Array(bufferLength);
                isAudioSetup = true;
                return true;
            } catch (err) {
                console.error("Mic access denied or unavailable", err);
                alert("Microphone access is required for audio reactivity.");
                return false;
            }
        }

        audioToggle.addEventListener('change', async (e) => {
            if (e.target.checked) {
                const success = await setupAudio();
                if (!success) e.target.checked = false;
            }
        });

        // --- Particle Engine ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        
        let particlesArray = [];
        let particlesEnabled = true;
        let densityDivider = parseInt(particleCountSlider.value);
        let baseSpeedMultiplier = parseFloat(particleSpeedSlider.value);

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.baseSize = Math.random() * 3 + 1;
                this.size = this.baseSize;
                this.baseSpeedX = Math.random() * 1 - 0.5;
                this.baseSpeedY = Math.random() * -1 - 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update(audioLevel) {
                // Calculate dynamic speed and size based on settings and audio
                let currentSpeed = baseSpeedMultiplier;
                if (audioToggle.checked && isAudioSetup) {
                    currentSpeed += (audioLevel / 50); // Boost speed with audio
                    this.size = this.baseSize + (audioLevel / 15); // Pulse size with audio
                } else {
                    this.size = this.baseSize;
                }

                this.x += this.baseSpeedX * currentSpeed;
                this.y += this.baseSpeedY * currentSpeed;
                
                // Wrap around edges
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / densityDivider;
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Get Audio Data once per frame if active
            let currentAudioLevel = 0;
            if (audioToggle.checked && isAudioSetup && dataArray) {
                analyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for(let i = 0; i < dataArray.length; i++) {
                    sum += dataArray[i];
                }
                currentAudioLevel = sum / dataArray.length;
            }

            if (particlesEnabled) {
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update(currentAudioLevel);
                    particlesArray[i].draw();
                }
            }
            requestAnimationFrame(animateParticles);
        }

        // Particle Settings Listeners
        particleToggle.addEventListener('change', (e) => particlesEnabled = e.target.checked);
        
        particleCountSlider.addEventListener('change', (e) => {
            // Reverse the logic so higher slider value = more particles (smaller divider)
            const maxVal = 20000;
            const minVal = 2000;
            densityDivider = maxVal - e.target.value + minVal; 
            initParticles();
        });

        particleSpeedSlider.addEventListener('input', (e) => {
            baseSpeedMultiplier = parseFloat(e.target.value);
        });

        initParticles();
        animateParticles();

    </script>
</body>
</html>
