<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oAvs // Production Workspace</title>
    <style>
        /* --- DYNAMIC GRADIENT ENGINE PRESETS --- */
        body.preset-cyber {
            --gradient-start: #00ffcc;
            --gradient-mid: #0066ff;
            --gradient-end: #7000ff;
            --accent-glow: rgba(0, 255, 204, 0.3);
        }
        body.preset-sunset {
            --gradient-start: #ff3366;
            --gradient-mid: #ff6600;
            --gradient-end: #ffcc00;
            --accent-glow: rgba(255, 51, 102, 0.3);
        }
        body.preset-toxic {
            --gradient-start: #adff2f;
            --gradient-mid: #00ff88;
            --gradient-end: #00a8ff;
            --accent-glow: rgba(0, 255, 136, 0.3);
        }
        body.preset-vamp {
            --gradient-start: #ff0055;
            --gradient-mid: #4d00ff;
            --gradient-end: #0b0b12;
            --accent-glow: rgba(255, 0, 85, 0.3);
        }

        :root {
            --bg-dark: #06060a;
            --panel-bg: rgba(10, 10, 14, 0.80);
            --text-pure: #ffffff;
            --text-muted: #71717a;
            --industrial-grid: radial-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px);
            --border-spec: 1px solid rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            background-image: var(--industrial-grid);
            background-size: 24px 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-pure);
            height: 100vh;
            overflow: hidden;
            display: flex;
            transition: background 0.5s ease;
        }

        /* --- SHARED GRADIENT ANIMATION KEYFRAME --- */
        @keyframes dynamicGradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- INDUSTRIAL ACCENTS --- */
        .geo-marker {
            position: absolute;
            font-size: 10px;
            font-family: monospace;
            color: rgba(255, 255, 255, 0.15);
            pointer-events: none;
            letter-spacing: 0.2em;
            z-index: 5;
        }
        .marker-tr { top: 20px; right: 20px; }

        /* --- LEFT-ALIGNED ADMIN CORE SIDEBAR --- */
        .admin-sidebar {
            width: 360px;
            height: 100vh;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border-right: var(--border-spec);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            z-index: 10;
            position: relative;
        }

        /* --- THE BLENDED LOGO COMPONENT --- */
        .logo-container {
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 10px;
        }

        .brand-logo {
            font-size: 38px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            /* Gradient Mask Blend Setup */
            background: linear-gradient(-45deg, var(--gradient-start), var(--gradient-mid), var(--gradient-end));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: dynamicGradientShift 12s ease infinite;
            filter: drop-shadow(0 2px 10px rgba(0, 0, 0, 0.5));
            display: inline-block;
        }

        .panel-title {
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-top: -5px;
        }

        /* --- CONTROLS & TYPOGRAPHY STYLING --- */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        .video-url-input, .preset-dropdown {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: var(--border-spec);
            padding: 12px 14px;
            border-radius: 4px;
            color: var(--text-pure);
            font-family: monospace;
            font-size: 12px;
            transition: all 0.3s ease;
            outline: none;
        }

        .video-url-input:focus, .preset-dropdown:focus {
            border-color: var(--gradient-start);
            box-shadow: 0 0 12px var(--accent-glow);
        }

        .preset-dropdown option {
            background: #121218;
            color: var(--text-pure);
        }

        .action-btn {
            background: linear-gradient(-45deg, var(--gradient-start), var(--gradient-mid));
            background-size: 200% 200%;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--accent-glow);
            background-position: right center;
        }

        /* --- MAIN VIEWPORT CANVAS (RIGHT AREA) --- */
        .display-canvas {
            flex-grow: 1;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
        }

        .main-loop-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* --- SOCIAL PROOF INTEGRATION BLOCK --- */
        .social-proof-panel {
            position: absolute;
            top: 40px;
            right: 40px;
            background: rgba(8, 8, 12, 0.85);
            backdrop-filter: blur(12px);
            border: var(--border-spec);
            padding: 20px 25px;
            border-radius: 6px;
            display: flex;
            gap: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            z-index: 5;
        }

        .stat-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-val {
            font-family: "Courier New", Courier, monospace;
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            display: flex;
            align-items: center;
        }

        .stat-lbl {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .live-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #ff3366;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulseGlow 1.5s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 8px #ff3366; }
            100% { transform: scale(0.9); opacity: 0.6; }
        }

        .matrix-info {
            font-size: 11px;
            color: var(--text-muted);
            font-family: monospace;
            line-height: 1.7;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 15px;
        }
    </style>
</head>
<body class="preset-cyber">

    <div class="geo-marker marker-tr">SYS_REF // MATRIX_v2.8</div>

    <!-- LEFT ADMIN INTERFACE -->
    <div class="admin-sidebar">
        
        <!-- BLENDED BRAND LOGO ZONE -->
        <div class="logo-container">
            <div class="brand-logo" id="logoTarget">oAvs</div>
            <div class="panel-title">Workspace Core</div>
        </div>
        
        <!-- VIDEO URL ACCELERATOR INPUT -->
        <div class="control-group">
            <label class="control-label" for="videoSourceInput">Video Asset URL / Path</label>
            <input type="text" id="videoSourceInput" class="video-url-input" placeholder="Paste .mp4 pipeline link...">
            <button onclick="updateLoopVideo()" class="action-btn">Update Video Feed</button>
        </div>

        <!-- ENGINE GRADIENT PRESETS SELECTOR -->
        <div class="control-group">
            <label class="control-label" for="gradientPresetSelector">Gradient Movement Profile</label>
            <select id="gradientPresetSelector" class="preset-dropdown" onchange="changeEnginePreset(this.value)">
                <option value="preset-cyber">CYBER CYAN // ACTIVATE</option>
                <option value="preset-sunset">SUNSET HORIZON // TOKYO</option>
                <option value="preset-toxic">TOXIC MATRIX // SLICK</option>
                <option value="preset-vamp">DARK MATTER // EMPIRE</option>
            </select>
        </div>

        <!-- TECHNICAL RUNTIME METRICS BELOW FOLD -->
        <div class="control-group" style="margin-top: auto;">
            <div class="control-label" style="margin-bottom: 2px;">System Framework</div>
            <div class="matrix-info">
                ORIENTATION: LEFT_LOCKED<br>
                BLEND MODULE: CLIPPED_TRANS<br>
                RENDER SCALE: UNBLOCKED_CANVAS
            </div>
        </div>
    </div>

    <!-- MAIN INTERACTIVE CANVAS -->
    <div class="display-canvas">
        
        <!-- VIDEO REPLAY PIPELINE -->
        <video id="loopTarget" class="main-loop-video" autoplay loop muted playsinline>
            <source src="https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
        </video>

        <!-- LIVE SOCIAL PROOF MATRIX OVERLAY -->
        <div class="social-proof-panel">
            <div class="stat-block">
                <div class="stat-val"><span class="live-dot"></span>14.2K</div>
                <div class="stat-lbl">Live Viewers</div>
            </div>
            <div class="stat-block" style="border-left: 1px solid rgba(255,255,255,0.1); padding-left: 25px;">
                <div class="stat-val" style="color: #ffffff;" id="retentionVal">89.4%</div>
                <div class="stat-lbl">Avg Retention</div>
            </div>
        </div>

    </div>

    <!-- CODE CONTROLLERS -->
    <script>
        // Hot-swapping looping video files instantly without crashing layout vectors
        function updateLoopVideo() {
            const inputField = document.getElementById('videoSourceInput');
            const videoElement = document.getElementById('loopTarget');
            
            if (inputField.value.trim() !== "") {
                videoElement.src = inputField.value.trim();
                videoElement.load();
                videoElement.play().catch(error => {
                    console.log("Autoplay safety interception logged:", error);
                });
            }
        }

        // Swapping active moving gradient presets globally to update panel accents & logo maps simultaneously
        function changeEnginePreset(selectedPreset) {
            // Wipe standard presets from body node
            document.body.classList.remove('preset-cyber', 'preset-sunset', 'preset-toxic', 'preset-vamp');
            
            // Inject new target parameters
            document.body.classList.add(selectedPreset);
            
            // Adjust retention analytics visualization accent subtly based on style
            const retentionMetric = document.getElementById('retentionVal');
            if(selectedPreset === 'preset-sunset') {
                retentionMetric.style.color = '#ff6600';
            } else if(selectedPreset === 'preset-toxic') {
                retentionMetric.style.color = '#00ff88';
            } else if(selectedPreset === 'preset-vamp') {
                retentionMetric.style.color = '#ff0055';
            } else {
                retentionMetric.style.color = '#00ffcc';
            }
        }
    </script>
</body>
</html>
