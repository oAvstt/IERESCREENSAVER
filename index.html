<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oAvs // Cinematic Workspace</title>
    <style>
        :root {
            --bg-dark: #08080c;
            --panel-bg: rgba(13, 13, 18, 0.75);
            --accent-cyan: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.2);
            --text-pure: #ffffff;
            --text-muted: #71717a;
            --industrial-grid: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            --border-spec: 1px solid rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            background-image: var(--industrial-grid);
            background-size: 24px 24px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-pure);
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- GEOMETRIC ACCENTS & WATERMARKS --- */
        .geo-marker {
            position: absolute;
            font-size: 10px;
            font-family: monospace;
            color: rgba(255, 255, 255, 0.15);
            pointer-events: none;
            letter-spacing: 0.2em;
        }
        .marker-tr { top: 20px; right: 20px; }

        /* --- LEFT-ALIGNED ADMIN BOX --- */
        .admin-sidebar {
            width: 360px;
            height: 100vh;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border-right: var(--border-spec);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            gap: 35px;
            z-index: 10;
            position: relative;
        }

        /* IMPACTFUL TYPOGRAPHY HEADERS */
        .panel-title {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-pure);
            border-left: 3px solid var(--accent-cyan);
            padding-left: 10px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
        }

        /* INPUT GEARS */
        .video-url-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: var(--border-spec);
            padding: 12px 16px;
            border-radius: 4px;
            color: var(--text-pure);
            font-family: monospace;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .video-url-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 10px var(--accent-glow);
        }

        .action-btn {
            background: var(--accent-cyan);
            color: #000000;
            border: none;
            padding: 12px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        /* --- MAIN DISPLAY CANVAS (RIGHT) --- */
        .display-canvas {
            flex-grow: 1;
            height: 100vh;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
        }

        .main-loop-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- SOCIAL PROOF INTEGRATION BLOCK --- */
        .social-proof-panel {
            position: absolute;
            top: 40px;
            right: 40px;
            background: rgba(10, 10, 14, 0.85);
            backdrop-filter: blur(8px);
            border: var(--border-spec);
            padding: 20px 25px;
            border-radius: 6px;
            display: flex;
            gap: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .stat-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-val {
            font-family: "Courier New", Courier, monospace;
            font-size: 22px;
            font-weight: 700;
            color: var(--accent-cyan);
            text-shadow: 0 0 8px var(--accent-glow);
        }

        .stat-lbl {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 600;
        }

        .live-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: #ff3366;
            border-radius: 50%;
            margin-right: 6px;
            animate: pulse 1.5s infinite;
        }
    </style>
</head>
<body>

    <div class="geo-marker marker-tr">SYS_REF // LOOPER_v2.6</div>

    <!-- LEFT ADMIN CONTROL SIDEBAR -->
    <div class="admin-sidebar">
        <h2 class="panel-title">Control Core</h2>
        
        <!-- VIDEO INPUT ACCELERATOR -->
        <div class="control-group">
            <label class="control-label" for="videoSourceInput">Active Video Path / URL</label>
            <input type="text" id="videoSourceInput" class="video-url-input" placeholder="Paste .mp4 link or filename...">
            <button onclick="updateLoopVideo()" class="action-btn">Load Loop Stream</button>
        </div>

        <div class="control-group" style="margin-top: auto;">
            <div class="control-label" style="margin-bottom: 5px;">Workspace Matrix</div>
            <div style="font-size: 11px; color: var(--text-muted); line-height: 1.6;">
                Layout orientation: LEFT OVERLAY<br>
                Grid spacing: 24PX COMPACT
            </div>
        </div>
    </div>

    <!-- MAIN MEDIA VIEWPORTS -->
    <div class="display-canvas">
        
        <!-- VIDEO LAYER -->
        <video id="loopTarget" class="main-loop-video" autoplay loop muted playsinline>
            <source src="https://storage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" type="video/mp4">
        </video>

        <!-- FLOATING OVERLAY SOCIAL PROOF METRICS -->
        <div class="social-proof-panel">
            <div class="stat-block">
                <div class="stat-val"><span class="live-dot"></span>14.2K</div>
                <div class="stat-lbl">Live Retainers</div>
            </div>
            <div class="stat-block" style="border-left: 1px solid rgba(255,255,255,0.1); padding-left: 25px;">
                <div class="stat-val">89.4%</div>
                <div class="stat-lbl">Avg Retention</div>
            </div>
        </div>

    </div>

    <script>
        function updateLoopVideo() {
            const inputField = document.getElementById('videoSourceInput');
            const videoElement = document.getElementById('loopTarget');
            
            if (inputField.value.trim() !== "") {
                // Smoothly reload source without crashing layout
                videoElement.src = inputField.value.trim();
                videoElement.load();
                videoElement.play().catch(error => {
                    console.log("Autoplay playback prevention handler triggered:", error);
                });
            }
        }
    </script>
</body>
</html>
