<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iere Screensaver Master Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=Montserrat:wght@300;400;700&family=Oswald:wght@300;700&family=Syncopate:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            /* Default Layout States */
            --bg-gradient: linear-gradient(-45deg, #ff5e62, #ff9966, #ffb347, #ffcc33);
            --text-color: #ffffff;
            --circle-color: #ffffff;
            --circle-bg: rgba(255, 255, 255, 0);
            --circle-glow: 0px;
            --circle-size: 320px;
            
            /* Typography Variables */
            --main-font: 'Inter', sans-serif;
            --sub-font: 'Inter', sans-serif;
            --footer-font: 'Inter', sans-serif;

            /* Environment Vectors */
            --gradient-speed: 15s;
            --bg-brightness: 100%;
            --video-opacity: 0.5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
        }

        /* Full Screen Gateway Security Wall */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a;
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), pointer-events 0.6s ease;
        }
        #lock-screen.unlocked {
            opacity: 0;
            pointer-events: none;
        }
        .lock-container {
            width: 360px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
        }

        /* Live Gradient Background Engine */
        #gradient-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientFlow var(--gradient-speed) ease infinite;
            filter: brightness(var(--bg-brightness));
            z-index: 1;
        }

        /* Video Loop Integration Container */
        #video-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: 2;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #particles-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3;
            pointer-events: none;
        }

        #content-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #content-tint-box {
            padding: 40px 60px;
            border-radius: 24px;
            background: rgba(0, 0, 0, 0);
            transition: all 0.5s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 90vw;
        }

        #main-text {
            font-family: var(--main-font);
            font-size: 4.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 25px;
            letter-spacing: 8px;
            text-shadow: 0 4px 20px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        #sub-text {
            font-family: var(--sub-font);
            font-size: 1.3rem;
            font-weight: 300;
            color: var(--text-color);
            margin-top: 35px;
            letter-spacing: 3px;
            opacity: 0.9;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        #logo-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 50px;
        }

        /* Enhanced Corona Circle Component */
        #logo-circle {
            position: absolute;
            width: var(--circle-size);
            height: var(--circle-size);
            border: 2px solid var(--circle-color);
            background: var(--circle-bg);
            border-radius: 50%;
            display: none;
            pointer-events: none;
            filter: drop-shadow(0 0 var(--circle-glow) var(--circle-color));
            transition: background 0.3s ease, border-color 0.3s ease;
            z-index: 0;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        #logo, .event-logo-slot {
            max-width: 240px;
            width: 16vw;
            min-width: 125px;
            cursor: pointer;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1;
        }

        .event-logo-slot {
            display: none;
            max-height: 160px;
            width: auto;
            margin-left: 20px;
        }

        #logo:hover, .event-logo-slot:hover { transform: scale(1.05); }

        /* Chrono-Scheduler Viewport Anchor Node */
        #overlay-clock {
            position: absolute;
            top: 35px;
            right: 35px;
            font-family: var(--sub-font);
            color: var(--text-color);
            z-index: 4;
            text-align: right;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
            display: none;
        }
        .clock-time { font-size: 2rem; font-weight: 700; letter-spacing: 1px; line-height: 1; }
        .clock-meta { font-size: 0.85rem; font-weight: 400; letter-spacing: 2px; opacity: 0.7; margin-top: 4px; text-transform: uppercase; }

        /* Dynamic System Footer Line Anchor */
        #footer-text {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--footer-font);
            font-size: 0.9rem;
            font-weight: 400;
            color: var(--text-color);
            letter-spacing: 2px;
            opacity: 0.6;
            z-index: 4;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        #fullscreen-btn {
            position: absolute;
            bottom: 30px; right: 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; width: 50px; height: 50px; border-radius: 50%;
            font-size: 1.5rem; cursor: pointer; backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center; z-index: 10;
            transition: all 0.3s ease;
        }
        #fullscreen-btn:hover { background: rgba(255, 255, 255, 0.25); transform: scale(1.1); }

        /* Fullscreen Flag Auto Hide Button rules */
        :fullscreen #fullscreen-btn { display: none !important; }
        :-webkit-full-screen #fullscreen-btn { display: none !important; }

        /* Master Control Panel Overlay UI */
        #settings-modal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 520px; max-height: 85vh;
            display: flex; flex-direction: column;
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; padding: 30px; color: white;
            z-index: 1000; opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 30px 70px rgba(0,0,0,0.6);
        }
        #settings-modal.active { opacity: 1; pointer-events: all; transform: translate(-50%, -50%) scale(1); }

        .settings-header {
            font-family: 'Inter', sans-serif; font-size: 1.4rem; font-weight: 600;
            margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 12px; flex-shrink: 0;
        }

        .settings-scroll-area { overflow-y: auto; padding-right: 12px; margin-bottom: 15px; }
        .settings-scroll-area::-webkit-scrollbar { width: 6px; }
        .settings-scroll-area::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
        .settings-scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        .setting-group { margin-bottom: 22px; display: flex; flex-direction: column; gap: 8px; }
        .setting-group label { font-family: 'Inter', sans-serif; font-size: 0.85rem; color: #b3b3b3; }

        input[type="text"], input[type="password"], input[type="datetime-local"], select {
            width: 100%; padding: 11px; background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
            color: white; font-size: 0.95rem; outline: none; transition: border 0.2s;
        }
        input[type="text"]:focus, select:focus, input[type="datetime-local"]:focus { border-color: #ff9966; }

        input[type="range"] { width: 100%; accent-color: #ff9966; cursor: pointer; }
        option { background: #141414; color: white; }

        .toggle-container { display: flex; align-items: center; justify-content: space-between; flex-direction: row; }
        .switch { position: relative; display: inline-block; width: 46px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0,0,0,0.5); transition: .3s; border-radius: 22px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #ff9966; }
        input:checked + .slider:before { transform: translateX(24px); }

        .action-btn {
            width: 100%; padding: 13px; border: none; border-radius: 8px;
            color: white; font-weight: 600; font-size: 0.95rem; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-gradient { background: linear-gradient(90deg, #ff9966, #ff5e62); }
        .btn-danger { background: rgba(233, 64, 87, 0.2); border: 1px solid rgba(233, 64, 87, 0.4); margin-top: 4px; }
        .action-btn:hover { opacity: 0.9; }

        .color-pickers { display: none; gap: 10px; }
        .color-pickers.active { display: flex; }
        .color-pickers input[type="color"] {
            border: none; width: 100%; height: 38px; border-radius: 8px; background: none; cursor: pointer;
        }
        .mic-badge { font-size: 0.7rem; background: #ff5e62; padding: 2px 6px; border-radius: 4px; margin-left: 8px; color: white; }
    </style>
</head>
<body>

    <!-- System Lockdown Veil Curtain -->
    <div id="lock-screen">
        <div class="lock-container">
            <h2 style="color: white; font-family: 'Inter', sans-serif; font-weight: 400; margin-bottom: 20px; font-size: 1.2rem; letter-spacing: 2px;">SYSTEM LOCK</h2>
            <div class="setting-group" style="text-align: left;">
                <label>Enter Passkey Authorization</label>
                <input type="password" id="gate-pass-input" placeholder="••••••••" style="text-align: center; font-size: 1.2rem; letter-spacing: 3px;">
            </div>
            <button id="gate-submit-btn" class="action-btn btn-gradient" style="margin-top: 10px;">Authenticate System</button>
        </div>
    </div>

    <!-- Live Render Modules -->
    <div id="gradient-bg">
        <video id="video-bg" loop muted playsinline></video>
    </div>
    <canvas id="particles-canvas"></canvas>

    <!-- Overlay Clock Module Frame -->
    <div id="overlay-clock">
        <div class="clock-time" id="clock-time-display">00:00:00</div>
        <div class="clock-meta" id="clock-meta-display">DYNAMIC LABELS</div>
    </div>

    <div id="content-layer">
        <div id="content-tint-box">
            <div id="main-text">IERE</div>
            <div id="logo-container">
                <div id="logo-circle"></div>
                <img src="iere-logo.png" id="logo" alt="Main Logo">
                <img id="custom-logo-1" class="event-logo-slot" alt="Event Logo 1">
                <img id="custom-logo-2" class="event-logo-slot" alt="Event Logo 2">
                <img id="custom-logo-3" class="event-logo-slot" alt="Event Logo 3">
            </div>
            <div id="sub-text">Do it better.</div>
        </div>
    </div>

    <div id="footer-text">ieregroup.com</div>

    <button id="fullscreen-btn" title="Toggle Fullscreen">⛶</button>

    <!-- Master Control Settings Panel Grid -->
    <div id="settings-modal">
        <div class="settings-header">System Control Deck</div>
        
        <div class="settings-scroll-area">
            <!-- Typography Headers Config -->
            <div class="setting-group">
                <label>Main Headline Wording</label>
                <input type="text" id="input-main-text" value="IERE">
            </div>

            <div class="setting-group">
                <label>Main Headline Font Family</label>
                <select id="select-main-font">
                    <option value="'Inter', sans-serif">Inter (Modern Light)</option>
                    <option value="'Oswald', sans-serif">Oswald (Bold Compact)</option>
                    <option value="'Cinzel', serif">Cinzel (Classic Royal)</option>
                    <option value="'Syncopate', sans-serif">Syncopate (Extended Tech)</option>
                    <option value="'Montserrat', sans-serif">Montserrat (Clean Geometric)</option>
                    <option value="'Playfair Display', serif">Playfair (Premium Fine Serif)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Sub-Headline Wording</label>
                <input type="text" id="input-sub-text" value="Do it better.">
            </div>

            <div class="setting-group">
                <label>Sub-Headline Font Family</label>
                <select id="select-sub-font">
                    <option value="'Inter', sans-serif">Inter (Modern Light)</option>
                    <option value="'Oswald', sans-serif">Oswald (Bold Compact)</option>
                    <option value="'Cinzel', serif">Cinzel (Classic Royal)</option>
                    <option value="'Montserrat', sans-serif">Montserrat (Clean Geometric)</option>
                    <option value="'Playfair Display', serif">Playfair (Premium Fine Serif)</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Bottom Sub-Footer Wording</label>
                <input type="text" id="input-footer-text" value="ieregroup.com">
            </div>

            <div class="setting-group toggle-container">
                <label>Contrast Text Tint Backplate Panel</label>
                <label class="switch">
                    <input type="checkbox" id="tint-box-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">

            <!-- Chrono-Scheduler Matrix Control Box -->
            <div style="border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.2); margin-bottom: 22px;">
                <label style="font-weight: 600; color: #fff; display:block; margin-bottom:12px;">Advanced Overlay Clock & Scheduler</label>
                
                <div class="setting-group toggle-container">
                    <label>Enable Chrono UI Module Overlay</label>
                    <label class="switch">
                        <input type="checkbox" id="clock-toggle">
                        <span class="slider"></span>
                    </label>
                </div>

                <div id="extended-clock-controls" style="display:none; flex-direction:column; gap:15px; border-left: 2px solid rgba(255,255,255,0.1); padding-left: 15px;">
                    <div class="setting-group">
                        <label>Operational Display Mode</label>
                        <select id="select-clock-mode">
                            <option value="clock">Real-Time Clock Matrix</option>
                            <option value="countdown">Production Countdown Target</option>
                        </select>
                    </div>
                    <div class="setting-group id-countdown-node" style="display:none;">
                        <label>Target Expiration Date & Time</label>
                        <input type="datetime-local" id="input-countdown-target">
                    </div>
                    <div class="setting-group id-countdown-node" style="display:none;">
                        <label>Custom Countdown Event Label Prefix</label>
                        <input type="text" id="input-countdown-label" value="Live Transmission">
                    </div>
                </div>
            </div>

            <!-- Core Assets -->
            <div class="setting-group">
                <label>Primary Main Image Vector Source</label>
                <select id="main-logo-select">
                    <option value="iere-logo.png">Original (iere-logo.png)</option>
                    <option value="iere-logo1.png">Logo 1 (iere-logo1.png)</option>
                    <option value="iere-logo2.png">Logo 2 (iere-logo2.png)</option>
                    <option value="iere-logo3.png">Logo 3 (iere-logo3.png)</option>
                    <option value="iere-logo4.png">Logo 4 (iere-logo4.png)</option>
                    <option value="iere-logo5.png">Logo 5 (iere-logo5.png)</option>
                    <option value="hidden">Hidden / Removed</option>
                </select>
            </div>

            <!-- Corona Ring Modules with Fills & Glow Targets -->
            <div class="setting-group toggle-container">
                <label>Enable Locked Halo Circle Ring</label>
                <label class="switch">
                    <input type="checkbox" id="circle-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <div id="extended-circle-controls" style="display: none; flex-direction: column; gap: 15px; border-left: 2px solid rgba(255,255,255,0.1); padding-left: 15px; margin-bottom: 15px;">
                <div class="setting-group">
                    <label>Circle Boundary Relative Scale (Size)</label>
                    <input type="range" id="input-circle-size" min="100" max="600" value="320" step="5">
                </div>
                <div class="setting-group toggle-container">
                    <label>Fill Inner Circle Solid Background</label>
                    <label class="switch">
                        <input type="checkbox" id="circle-fill-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="setting-group">
                    <label>Circle Boundary Vector Color</label>
                    <input type="color" id="input-circle-color" value="#ffffff" style="width:100%; height:36px; border-radius:8px; border:none; background:none; cursor:pointer;">
                </div>
                <div class="setting-group">
                    <label>Corona Outer Radial Glow Power</label>
                    <input type="range" id="input-circle-glow" min="0" max="60" value="0" step="1">
                </div>
            </div>

            <!-- Event Multi Upload Matrix -->
            <div class="setting-group" style="border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.2);">
                <label style="font-weight: 600; color: #fff;">Event Presentation Logos (Max 3 Slots)</label>
                <div style="margin-top: 10px; display:flex; flex-direction:column; gap:12px;">
                    <div>
                        <label>Target Channel Mapping Node</label>
                        <select id="event-slot-index">
                            <option value="1">Event Slot Array 1</option>
                            <option value="2">Event Slot Array 2</option>
                            <option value="3">Event Slot Array 3</option>
                        </select>
                    </div>
                    <div>
                        <label>Select Matrix Image File Source</label>
                        <input type="file" id="custom-logo-upload" accept="image/*" style="width: 100%; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: white;">
                    </div>
                    <button id="remove-event-logo-btn" class="action-btn btn-danger">Flush Selected Slot Target Image</button>
                </div>
            </div>

            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">

            <!-- Integrated Video Loop Scene Settings Box -->
            <div style="border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.2); margin-bottom: 22px;">
                <label style="font-weight: 600; color: #fff; display:block; margin-bottom:12px;">Video Scene Loop Controller</label>
                
                <div class="setting-group toggle-container">
                    <label>Enable Background Video Feed Layer</label>
                    <label class="switch">
                        <input type="checkbox" id="video-toggle">
                        <span class="slider"></span>
                    </label>
                </div>

                <div id="extended-video-controls" style="display:none; flex-direction:column; gap:15px; border-left: 2px solid rgba(255,255,255,0.1); padding-left: 15px;">
                    <div class="setting-group">
                        <label>Video File Source Loop Path (URL / Local Filename)</label>
                        <input type="text" id="input-video-src" placeholder="e.g. cinematic-bg.mp4">
                    </div>
                    <div class="setting-group">
                        <label>Video Layer Display Alpha (Opacity)</label>
                        <input type="range" id="input-video-opacity" min="0" max="100" value="50" step="5">
                    </div>
                </div>
            </div>

            <!-- Ambient Background Engine Adjusters -->
            <div class="setting-group">
                <label>Gradient Layout Mapping Profile</label>
                <select id="gradient-type-select">
                    <option value="linear">Linear Sweep Matrix</option>
                    <option value="radial">Radial Hub Ambient Center</option>
                </select>
            </div>

            <div class="setting-group">
                <label>Color Profiles</label>
                <select id="gradient-select">
                    <option value="#ff5e62, #ff9966, #ffb347, #ffcc33">Bocas Sunset (Warm)</option>
                    <option value="#00c6ff, #0072ff, #1cb5e0, #000046">Maracas Deep (Ocean)</option>
                    <option value="#8A2387, #E94057, #F27121">Scarlet Ibis (Vibrant)</option>
                    <option value="#ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3">Trinidad Carnival Spectrum (Rainbow)</option>
                    <option value="#232526, #414345, #0f2027, #203a43">Pitch Midnight (Dark)</option>
                    <option value="custom">Custom Configuration Coordinate...</option>
                </select>
            </div>

            <div class="setting-group color-pickers" id="custom-colors">
                <input type="color" id="color1" value="#ff5e62">
                <input type="color" id="color2" value="#ff9966">
            </div>

            <div class="setting-group">
                <label>Gradient Vector Flow Cycle Speed (Duration)</label>
                <input type="range" id="gradient-speed-slider" min="2" max="40" value="15" step="1">
            </div>

            <div class="setting-group">
                <label>Monitor Backlight Brightness Level</label>
                <input type="range" id="gradient-brightness-slider" min="20" max="150" value="100" step="5">
            </div>

            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">

            <!-- Particles Physics Control Grid -->
            <div class="setting-group">
                <label>Canvas Fluid System Profile (11 Variants)</label>
                <select id="particle-style-select">
                    <option value="dust">1. Ethereal Space Floating Dust</option>
                    <option value="fire">2. Cinematic Rising Embers</option>
                    <option value="actual-fire">3. Authentic Turbulent Fluid Flame Box</option>
                    <option value="matrix">4. Digital Binary Code Rain Cascades</option>
                    <option value="snow">5. Deep Polar Drift Blizzard</option>
                    <option value="bubbles">6. Rising Liquid Effervescence</option>
                    <option value="stars">7. Hyperdrive Speed Warp Clusters</option>
                    <option value="geometry">8. Polyhedral Neural Network Grid Nodes</option>
                    <option value="neon-lines">9. Vertical Cyberpunk Laser Tracers</option>
                    <option value="vortex">10. Centripetal Gravity Core Swirl Vortex</option>
                    <option value="plasma">11. Volatile Organic Plasma Clusters</option>
                </select>
            </div>

            <div class="setting-group toggle-container">
                <label>Render Active Fluid Particles</label>
                <label class="switch">

                <label>Global Particle Generation Volume (Density)</label>
                <input type="range" id="particle-count" min="2000" max="20000" value="9000" step="1000">
            </div>

            <div class="setting-group">
                <label>Particle Core Kinetic Velocity Limit (Speed)</label>
                <input type="range" id="particle-speed" min="0.1" max="5" value="1" step="0.1">
            </div>

            <!-- Microphone Optimization Node -->
            <div style="border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; background: rgba(0,0,0,0.2); display: flex; flex-direction: column; gap: 15px;">
                <div class="setting-group toggle-container" style="margin-bottom:0;">
                    <label style="font-weight:600; color:#fff;">Acoustic Processing Node <span class="mic-badge">Mic Sync</span></label>
                    <label class="switch">
                        <input type="checkbox" id="audio-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
                <div id="extended-audio-controls" style="display: none; flex-direction: column; gap: 15px; border-left: 2px solid rgba(255,255,255,0.1); padding-left: 15px;">
                    <div class="setting-group">
                        <label>Frequency Equalizer Crossover Range Target</label>
                        <select id="audio-band-select">
                            <option value="all">Full Spectrum Integration</option>
                            <option value="bass">Sub-Bass Response Frequencies (Low Channels)</option>
                            <option value="mid">Vocal Mid-Range Resonance (Mid Channels)</option>
                            <option value="treble">High Frequency Sharp Decays (Treble Channels)</option>
                        </select>
                    </div>
                    <div class="setting-group">
                        <label>Acoustic Input Gain Multiplication Level (Sensitivity)</label>
                        <input type="range" id="audio-gain-slider" min="1" max="10" value="4" step="0.5">
                    </div>
                </div>
            </div>

        </div>

        <button id="close-btn" class="action-btn btn-gradient">Commit Changes & Close</button>
    </div>

    <script>
        // --- Core Application Infrastructure Map ---
        const lockScreen = document.getElementById('lock-screen');
        const gatePassInput = document.getElementById('gate-pass-input');
        const gateSubmitBtn = document.getElementById('gate-submit-btn');

        const logo = document.getElementById('logo');
        const mainTextEl = document.getElementById('main-text');
        const subTextEl = document.getElementById('sub-text');
        const footerTextEl = document.getElementById('footer-text');
        const settingsModal = document.getElementById('settings-modal');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const closeBtn = document.getElementById('close-btn');
        
        // Input Controls Anchor Nodes
        const inputMainText = document.getElementById('input-main-text');
        const selectMainFont = document.getElementById('select-main-font');
        const inputSubText = document.getElementById('input-sub-text');
        const selectSubFont = document.getElementById('select-sub-font');
        const inputFooterText = document.getElementById('input-footer-text');
        const tintBoxToggle = document.getElementById('tint-box-toggle');
        const contentTintBox = document.getElementById('content-tint-box');
        
        const mainLogoSelect = document.getElementById('main-logo-select');
        const circleToggle = document.getElementById('circle-toggle');
        const extendedCircleControls = document.getElementById('extended-circle-controls');
        const inputCircleSize = document.getElementById('input-circle-size');
        const circleFillToggle = document.getElementById('circle-fill-toggle');
        const logoCircleEl = document.getElementById('logo-circle');
        const inputCircleColor = document.getElementById('input-circle-color');
        const inputCircleGlow = document.getElementById('input-circle-glow');

        // New Asset Handles (Video Loops & Scheduler Elements)
        const videoBgEl = document.getElementById('video-bg');
        const videoToggle = document.getElementById('video-toggle');
        const extendedVideoControls = document.getElementById('extended-video-controls');
        const inputVideoSrc = document.getElementById('input-video-src');
        const inputVideoOpacity = document.getElementById('input-video-opacity');

        const overlayClockEl = document.getElementById('overlay-clock');
        const clockToggle = document.getElementById('clock-toggle');
        const extendedClockControls = document.getElementById('extended-clock-controls');
        const selectClockMode = document.getElementById('select-clock-mode');
        const inputCountdownTarget = document.getElementById('input-countdown-target');
        const inputCountdownLabel = document.getElementById('input-countdown-label');
        const clockTimeDisplay = document.getElementById('clock-time-display');
        const clockMetaDisplay = document.getElementById('clock-meta-display');

        const eventSlotIndex = document.getElementById('event-slot-index');
        const customLogoUpload = document.getElementById('custom-logo-upload');
        const removeEventLogoBtn = document.getElementById('remove-event-logo-btn');

        const gradientTypeSelect = document.getElementById('gradient-type-select');
        const gradientSelect = document.getElementById('gradient-select');
        const customColorsContainer = document.getElementById('custom-colors');
        const color1 = document.getElementById('color1');
        const color2 = document.getElementById('color2');
        const gradientSpeedSlider = document.getElementById('gradient-speed-slider');
        const gradientBrightnessSlider = document.getElementById('gradient-brightness-slider');
        const root = document.documentElement;

        const particleStyleSelect = document.getElementById('particle-style-select');
        const particleToggle = document.getElementById('particle-toggle');
        const particleCountSlider = document.getElementById('particle-count');
        const particleSpeedSlider = document.getElementById('particle-speed');
        
        const audioToggle = document.getElementById('audio-toggle');
        const extendedAudioControls = document.getElementById('extended-audio-controls');
        const audioBandSelect = document.getElementById('audio-band-select');
        const audioGainSlider = document.getElementById('audio-gain-slider');

        const TARGET_PASSWORD = "Iere26";

        // --- Core Verification Layer Processing ---
        gateSubmitBtn.addEventListener('click', () => {
            if (gatePassInput.value === TARGET_PASSWORD) {
                lockScreen.classList.add('unlocked');
            } else {
                alert("Authorization Denied.");
                gatePassInput.value = "";
                gatePassInput.focus();
            }
        });
        gatePassInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') gateSubmitBtn.click(); });

        // --- Triple Click Settings Panel Access Hook ---
        let clickCount = 0;
        let clickTimer;
        [logo, mainTextEl, document.getElementById('custom-logo-1'), document.getElementById('custom-logo-2'), document.getElementById('custom-logo-3')].forEach(element => {
            element.addEventListener('click', () => {
                clickCount++;
                if (clickCount === 1) clickTimer = setTimeout(() => { clickCount = 0; }, 600);
                if (clickCount === 3) {
                    clearTimeout(clickTimer);
                    clickCount = 0;
                    if(lockScreen.classList.contains('unlocked')) {
                        settingsModal.classList.add('active');
                    }
                }
            });
        });

        closeBtn.addEventListener('click', () => { settingsModal.classList.remove('active'); });

        // --- Memory Synchronization Logic Matrix (LocalStorage) ---
        const memoryBlueprint = {
            mainText: { el: inputMainText, type: 'val', default: 'IERE' },
            mainFont: { el: selectMainFont, type: 'val', default: "'Inter', sans-serif" },
            subText: { el: inputSubText, type: 'val', default: 'Do it better.' },
            subFont: { el: selectSubFont, type: 'val', default: "'Inter', sans-serif" },
            footerText: { el: inputFooterText, type: 'val', default: 'ieregroup.com' },
            tintBox: { el: tintBoxToggle, type: 'chk', default: false },
            mainLogo: { el: mainLogoSelect, type: 'val', default: 'iere-logo.png' },
            circleEnabled: { el: circleToggle, type: 'chk', default: false },
            circleSize: { el: inputCircleSize, type: 'val', default: '320' },
            circleFilled: { el: circleFillToggle, type: 'chk', default: false },
            circleColor: { el: inputCircleColor, type: 'val', default: '#ffffff' },
            circleGlow: { el: inputCircleGlow, type: 'val', default: '0' },
            videoEnabled: { el: videoToggle, type: 'chk', default: false },
            videoSource: { el: inputVideoSrc, type: 'val', default: '' },
            videoOpacityValue: { el: inputVideoOpacity, type: 'val', default: '50' },
            clockEnabled: { el: clockToggle, type: 'chk', default: false },
            clockModeValue: { el: selectClockMode, type: 'val', default: 'clock' },
            clockTargetTimestamp: { el: inputCountdownTarget, type: 'val', default: '' },
            clockTargetLabel: { el: inputCountdownLabel, type: 'val', default: 'Live Transmission' },
            gradientType: { el: gradientTypeSelect, type: 'val', default: 'linear' },
            gradientPalette: { el: gradientSelect, type: 'val', default: '#ff5e62, #ff9966, #ffb347, #ffcc33' },
            customColor1: { el: color1, type: 'val', default: '#ff5e62' },
            customColor2: { el: color2, type: 'val', default: '#ff9966' },
            gradientSpeed: { el: gradientSpeedSlider, type: 'val', default: '15' },
            gradientBrightness: { el: gradientBrightnessSlider, type: 'val', default: '100' },
            particleStyle: { el: particleStyleSelect, type: 'val', default: 'dust' },
            particleEnabled: { el: particleToggle, type: 'chk', default: true },
            particleCount: { el: particleCountSlider, type: 'val', default: '9000' },
            particleSpeed: { el: particleSpeedSlider, type: 'val', default: '1' },
            audioReactive: { el: audioToggle, type: 'chk', default: false },
            audioBand: { el: audioBandSelect, type: 'val', default: 'all' },
            audioGain: { el: audioGainSlider, type: 'val', default: '4' }
        };

        function commitMemory() {
            const dataDump = {};
            for (const key in memoryBlueprint) {
                const node = memoryBlueprint[key];
                dataDump[key] = node.type === 'chk' ? node.el.checked : node.el.value;
            }
            dataDump.imgSlot1 = document.getElementById('custom-logo-1').src || "";
            dataDump.imgSlot2 = document.getElementById('custom-logo-2').src || "";
            dataDump.imgSlot3 = document.getElementById('custom-logo-3').src || "";
            localStorage.setItem('iere_screensaver_vault', JSON.stringify(dataDump));
        }

        function restoreMemory() {
            const cache = localStorage.getItem('iere_screensaver_vault');
            if (!cache) { executeUIEngineRefresh(); return; }
            try {
                const parsed = JSON.parse(cache);
                for (const key in memoryBlueprint) {
                    if (parsed[key] !== undefined) {
                        const node = memoryBlueprint[key];
                        if (node.type === 'chk') {
                            node.el.checked = parsed[key];
                        } else {
                            node.el.value = parsed[key];
                        }
                    }
                }
                if (parsed.imgSlot1) { const i1 = document.getElementById('custom-logo-1'); i1.src = parsed.imgSlot1; i1.style.display = 'block'; }
                if (parsed.imgSlot2) { const i2 = document.getElementById('custom-logo-2'); i2.src = parsed.imgSlot2; i2.style.display = 'block'; }
                if (parsed.imgSlot3) { const i3 = document.getElementById('custom-logo-3'); i3.src = parsed.imgSlot3; i3.style.display = 'block'; }
            } catch (err) { console.error("Memory Restore Corrupted:", err); }
            executeUIEngineRefresh();
        }

        // --- Live Application Event Routing Array ---
        let ActiveVideoSourcePath = "";

        function executeUIEngineRefresh() {
            mainTextEl.textContent = inputMainText.value;
            subTextEl.textContent = inputSubText.value;
            footerTextEl.textContent = inputFooterText.value;
            root.style.setProperty('--main-font', selectMainFont.value);
            root.style.setProperty('--sub-font', selectSubFont.value);
            root.style.setProperty('--footer-font', selectSubFont.value);

            if (tintBoxToggle.checked) {
                contentTintBox.style.background = "rgba(0, 0, 0, 0.45)";
                contentTintBox.style.backdropFilter = "blur(15px)";
                contentTintBox.style.webkitBackdropFilter = "blur(15px)";
                contentTintBox.style.border = "1px solid rgba(255, 255, 255, 0.1)";
            } else {
                contentTintBox.style.background = "rgba(0, 0, 0, 0)";
                contentTintBox.style.backdropFilter = "blur(0px)";
                contentTintBox.style.webkitBackdropFilter = "blur(0px)";
                contentTintBox.style.border = "none";
            }

            if (mainLogoSelect.value === 'hidden') {
                logo.style.display = 'none';
            } else {
                logo.src = mainLogoSelect.value;
                logo.style.display = 'block';
            }

            if (circleToggle.checked) {
                logoCircleEl.style.display = 'block';
                extendedCircleControls.style.display = 'flex';
            } else {
                logoCircleEl.style.display = 'none';
                extendedCircleControls.style.display = 'none';
            }
            
            root.style.setProperty('--circle-size', `${inputCircleSize.value}px`);
            root.style.setProperty('--circle-color', inputCircleColor.value);
            root.style.setProperty('--circle-bg', circleFillToggle.checked ? inputCircleColor.value : 'rgba(0,0,0,0)');
            root.style.setProperty('--circle-glow', `${inputCircleGlow.value}px`);

            // Video Processor Subroutine Refresh Engine
            if (videoToggle.checked) {
                extendedVideoControls.style.display = 'flex';
                videoBgEl.style.opacity = parseFloat(inputVideoOpacity.value) / 100;
                
                if (ActiveVideoSourcePath !== inputVideoSrc.value && inputVideoSrc.value.trim() !== "") {
                    ActiveVideoSourcePath = inputVideoSrc.value;
                    videoBgEl.src = ActiveVideoSourcePath;
                    videoBgEl.load();
                    videoBgEl.play().catch(e => console.log("Video track initialization deferred: waiting user event context."));
                }
            } else {
                extendedVideoControls.style.display = 'none';
                videoBgEl.style.opacity = 0;
                if (!videoBgEl.paused) videoBgEl.pause();
                ActiveVideoSourcePath = "";
            }

            // Scheduler & Clock UI Toggle Matrix
            if (clockToggle.checked) {
                overlayClockEl.style.display = 'block';
                extendedClockControls.style.display = 'flex';
                
                const countdownNodes = document.querySelectorAll('.id-countdown-node');
                countdownNodes.forEach(n => n.style.display = selectClockMode.value === 'countdown' ? 'flex' : 'none');
            } else {
                overlayClockEl.style.display = 'none';
                extendedClockControls.style.display = 'none';
            }

            root.style.setProperty('--gradient-speed', `${gradientSpeedSlider.value}s`);
            root.style.setProperty('--bg-brightness', `${gradientBrightnessSlider.value}%`);
            
            customColorsContainer.classList.toggle('active', gradientSelect.value === 'custom');
            
            let colors = gradientSelect.value;
            if (colors === 'custom') {
                colors = `${color1.value}, ${color2.value}, ${color1.value}, ${color2.value}`;
            }
            const gradString = gradientTypeSelect.value === 'linear' 
                ? `linear-gradient(-45deg, ${colors})` 
                : `radial-gradient(circle at center, ${colors})`;
            root.style.setProperty('--bg-gradient', gradString);

            particlesEnabled = particleToggle.checked;
            currentParticleStyle = particleStyleSelect.value;
            
            const maxVal = 20000; const minVal = 2000;
            densityDivider = maxVal - parseInt(particleCountSlider.value) + minVal;
            baseSpeedMultiplier = parseFloat(particleSpeedSlider.value);

            extendedAudioControls.style.display = audioToggle.checked ? 'flex' : 'none';
        }

        const interactiveInputs = [
            inputMainText, selectMainFont, inputSubText, selectSubFont, inputFooterText, tintBoxToggle,
            mainLogoSelect, circleToggle, inputCircleSize, circleFillToggle, inputCircleColor, inputCircleGlow,
            videoToggle, inputVideoSrc, inputVideoOpacity, clockToggle, selectClockMode, inputCountdownTarget, inputCountdownLabel,
            gradientTypeSelect, gradientSelect, color1, color2, gradientSpeedSlider, gradientBrightnessSlider,
            particleStyleSelect, particleToggle, particleSpeedSlider, audioBandSelect, audioGainSlider
        ];
        interactiveInputs.forEach(el => el.addEventListener('input', () => { executeUIEngineRefresh(); commitMemory(); }));
        interactiveInputs.forEach(el => el.addEventListener('change', () => { executeUIEngineRefresh(); commitMemory(); }));

        particleCountSlider.addEventListener('change', () => { executeUIEngineRefresh(); initParticles(); commitMemory(); });

        // --- Core Chrono-Engine Synchronization Clock Subroutine ---
        function runMasterChronometerPipeline() {
            if (!clockToggle.checked) return;

            const now = new Date();
            
            if (selectClockMode.value === 'clock') {
                let hrs = now.getHours();
                const mins = String(now.getMinutes()).padStart(2, '0');
                const secs = String(now.getSeconds()).padStart(2, '0');
                const ampm = hrs >= 12 ? 'PM' : 'AM';
                hrs = hrs % 12;
                hrs = hrs ? hrs : 12; // conversion logic for 0 hour index
                
                clockTimeDisplay.textContent = `${String(hrs).padStart(2, '0')}:${mins}:${secs}`;
                
                const options = { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
                clockMetaDisplay.textContent = `${ampm} | ${now.toLocaleDateString('en-US', options)}`;
            } else {
                // Production Countdown Tracker Logic Array
                const targetVal = inputCountdownTarget.value;
                const labelPrefix = inputCountdownLabel.value || "Transmission";
                clockMetaDisplay.textContent = labelPrefix;
                
                if (!targetVal) {
                    clockTimeDisplay.textContent = "00:00:00";
                    return;
                }
                
                const targetTime = new Date(targetVal);
                const difference = targetTime - now;
                
                if (difference <= 0) {
                    clockTimeDisplay.textContent = "00:00:00";
                    clockMetaDisplay.textContent = `${labelPrefix} [ ACTIVE ]`;
                    return;
                }
                
                const totalSecs = Math.floor(difference / 1000);
                const hrs = String(Math.floor(totalSecs / 3600)).padStart(2, '0');
                const mins = String(Math.floor((totalSecs % 3600) / 60)).padStart(2, '0');
                const secs = String(totalSecs % 60).padStart(2, '0');
                
                clockTimeDisplay.textContent = `${hrs}:${mins}:${secs}`;
            }
        }
        setInterval(runMasterChronometerPipeline, 1000);

        // --- Multi Logo Uploader Processing Router ---
        customLogoUpload.addEventListener('change', (e) => {
            const slot = eventSlotIndex.value;
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const targetImg = document.getElementById(`custom-logo-${slot}`);
                    targetImg.src = event.target.result;
                    targetImg.style.display = 'block';
                    commitMemory();
                };
                reader.readAsDataURL(file);
            }
        });

        removeEventLogoBtn.addEventListener('click', () => {
            const slot = eventSlotIndex.value;
            const targetImg = document.getElementById(`custom-logo-${slot}`);
            targetImg.src = "";
            targetImg.style.display = 'none';
            customLogoUpload.value = "";
            commitMemory();
        });

        // --- Screen Aspect Window Management ---
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(`Fullscreen error: ${err.message}`));
            } else {
                document.exitFullscreen();
            }
        });

        // --- Audio Context Data Capturing Engine ---
        let audioContext, analyser, dataArray;
        let isAudioSetup = false;

        async function setupAudio() {
            if (isAudioSetup) {
                if (audioContext.state === 'suspended') audioContext.resume();
                return true;
            }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                isAudioSetup = true;
                return true;
            } catch (err) {
                console.error("Mic Context Linking Failed", err);
                return false;
            }
        }

        audioToggle.addEventListener('change', async (e) => {
            if (e.target.checked) {
                const success = await setupAudio();
                if (!success) e.target.checked = false;
            }
            executeUIEngineRefresh();
            commitMemory();
        });

        // --- Dynamic 11-Channel Particle System Engine ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        
        let particlesArray = [];
        let particlesEnabled = true;
        let densityDivider = 9000;
        let baseSpeedMultiplier = 1;
        let currentParticleStyle = 'dust';

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        class Particle {
            constructor() { this.reset(true); }
            
            reset(initialStart = false) {
                this.x = Math.random() * canvas.width;
                
                const bottomSpawners = ['fire', 'actual-fire', 'bubbles', 'neon-lines'];
                if (initialStart || !bottomSpawners.includes(currentParticleStyle)) {
                    this.y = Math.random() * canvas.height;
                } else {
                    this.y = canvas.height + (Math.random() * 40);
                }
                
                this.color = '#ffffff';
                this.char = Math.random() > 0.5 ? '0' : '1'; // For Matrix style
                
                switch(currentParticleStyle) {
                    case 'actual-fire':
                        this.baseSize = Math.random() * 18 + 8;
                        this.baseSpeedX = Math.random() * 1.4 - 0.7;
                        this.baseSpeedY = Math.random() * -2.5 - 1.5;
                        this.life = 1.0;
                        this.decay = Math.random() * 0.015 + 0.008;
                        break;
                    case 'fire':
                        this.baseSize = Math.random() * 3 + 1;
                        this.baseSpeedX = Math.random() * 1.6 - 0.8;
                        this.baseSpeedY = Math.random() * -2 - 1.5;
                        this.opacity = Math.random() * 0.7 + 0.3;
                        break;
                    case 'matrix':
                        this.baseSize = Math.random() * 6 + 10;
                        this.baseSpeedX = 0;
                        this.baseSpeedY = Math.random() * 3 + 2;
                        this.opacity = Math.random() * 0.5 + 0.5;
                        if (initialStart) this.y = Math.random() * -canvas.height;
                        break;
                    case 'snow':
                        this.baseSize = Math.random() * 4 + 1;
                        this.baseSpeedX = Math.random() * 1 - 0.2;
                        this.baseSpeedY = Math.random() * 1 + 0.5;
                        this.opacity = Math.random() * 0.6 + 0.2;
                        break;
                    case 'bubbles':
                        this.baseSize = Math.random() * 5 + 2;
                        this.baseSpeedX = Math.random() * 0.6 - 0.3;
                        this.baseSpeedY = Math.random() * -1.5 - 0.5;
                        this.opacity = Math.random() * 0.4 + 0.1;
                        break;
                    case 'stars':
                        this.x = canvas.width / 2;
                        this.y = canvas.height / 2;
                        const angle = Math.random() * Math.PI * 2;
                        const speed = Math.random() * 4 + 1;
                        this.baseSpeedX = Math.cos(angle) * speed;
                        this.baseSpeedY = Math.sin(angle) * speed;
                        this.baseSize = 1;
                        this.opacity = 0.1;
                        break;
                    case 'geometry':
                        this.baseSize = Math.random() * 3 + 2;
                        this.baseSpeedX = Math.random() * 0.8 - 0.4;
                        this.baseSpeedY = Math.random() * 0.8 - 0.4;
                        this.opacity = Math.random() * 0.5 + 0.3;
                        break;
                    case 'neon-lines':
                        this.baseSize = Math.random() * 2 + 1; // Width of line
                        this.lineLength = Math.random() * 60 + 30;
                        this.baseSpeedX = 0;
                        this.baseSpeedY = Math.random() * -4 - 2;
                        this.opacity = Math.random() * 0.6 + 0.3;
                        break;
                    case 'vortex':
                        this.angle = Math.random() * Math.PI * 2;
                        this.radius = Math.random() * (canvas.width / 2);
                        this.angularSpeed = (Math.random() * 0.02 + 0.005) * (Math.random() > 0.5 ? 1 : -1);
                        this.radialSpeed = Math.random() * -0.5 - 0.2;
                        this.baseSize = Math.random() * 3 + 1;
                        this.opacity = 0.8;
                        break;
                    case 'plasma':
                        this.baseSize = Math.random() * 40 + 20;
                        this.baseSpeedX = Math.random() * 0.5 - 0.25;
                        this.baseSpeedY = Math.random() * 0.5 - 0.25;
                        this.opacity = Math.random() * 0.2 + 0.05;
                        break;
                    default: // dust
                        this.baseSize = Math.random() * 3 + 1;
                        this.baseSpeedX = Math.random() * 1 - 0.5;
                        this.baseSpeedY = Math.random() * -1 - 0.5;
                        this.opacity = Math.random() * 0.5 + 0.1;
                }
                this.size = this.baseSize;
            }

            update(audioMod) {
                let speedMod = baseSpeedMultiplier + audioMod;
                
                if (currentParticleStyle === 'vortex') {
                    this.angle += this.angularSpeed * baseSpeedMultiplier;
                    this.radius += this.radialSpeed * speedMod;
                    this.x = canvas.width / 2 + Math.cos(this.angle) * this.radius;
                    this.y = canvas.height / 2 + Math.sin(this.angle) * this.radius;
                    this.size = this.baseSize * (1 + audioMod);
                    if (this.radius < 10 || this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                        this.reset(false);
                    }
                    return;
                }

                this.x += this.baseSpeedX * speedMod;
                this.y += this.baseSpeedY * speedMod;

                // Modulate scale parameters based on calculated acoustic peaks
                if (currentParticleStyle !== 'actual-fire') {
                    this.size = this.baseSize * (1 + audioMod * 0.5);
                }

                // Style boundaries mapping loops
                switch(currentParticleStyle) {
                    case 'actual-fire':
                        this.x += (Math.sin(this.y / 20) * 0.4);
                        this.life -= this.decay;
                        this.size = this.baseSize * this.life * (1 + audioMod * 0.3);
                        this.opacity = this.life;
                        if (this.y < -20 || this.life <= 0 || this.x < 0 || this.x > canvas.width) this.reset(false);
                        break;
                    case 'fire':
                        this.opacity -= 0.003;
                        if (this.y < -10 || this.opacity <= 0) this.reset(false);
                        break;
                    case 'matrix':
                        if (Math.random() > 0.98) this.char = Math.floor(Math.random()*10).toString();
                        if (this.y > canvas.height) this.reset(false);
                        break;
                    case 'snow':
                        if (this.y > canvas.height || this.x > canvas.width || this.x < 0) this.reset(false);
                        break;
                    case 'bubbles':
                        this.x += Math.sin(this.y / 30) * 0.5;
                        if (this.y < -10) this.reset(false);
                        break;
                    case 'stars':
                        this.opacity += 0.01;
                        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset(false);
                        break;
                    case 'neon-lines':
                        if (this.y < -this.lineLength) this.reset(false);
                        break;
                    case 'plasma':
                        this.opacity = (Math.sin(Date.now() * 0.001 + this.x) * 0.1) + this.baseSize / 300;
                        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset(false);
                        break;
                    default: // dust
                        if (this.y < 0) this.y = canvas.height;
                        if (this.y > canvas.height) this.y = 0;
                        if (this.x < 0) this.x = canvas.width;
                        if (this.x > canvas.width) this.x = 0;
                }
            }

            draw() {
                switch(currentParticleStyle) {
                    case 'actual-fire':
                        let r = 255;
                        let g = Math.floor(200 * (this.life * 1.2));
                        let b = Math.floor(50 * (this.life * this.life));
                        if (g > 255) g = 255; if (g < 0) g = 0;
                        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.opacity})`;
                        break;
                    case 'fire':
                        const fireColors = ['rgba(255, 94, 98, ', 'rgba(255, 153, 102, ', 'rgba(255, 204, 51, '];
                        ctx.fillStyle = `${fireColors[Math.floor(this.baseSize * 10) % fireColors.length]}${this.opacity})`;
                        break;
                    case 'matrix':
                        ctx.fillStyle = `rgba(0, 255, 70, ${this.opacity})`;
                        ctx.font = `${this.size}px monospace`;
                        ctx.fillText(this.char, this.x, this.y);
                        return;
                    case 'neon-lines':
                        ctx.strokeStyle = `rgba(0, 240, 255, ${this.opacity})`;
                        ctx.lineWidth = this.size;
                        ctx.beginPath();
                        ctx.moveTo(this.x, this.y);
                        ctx.lineTo(this.x, this.y + this.lineLength);
                        ctx.stroke();
                        return;
                    case 'plasma':
                        let radGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                        radGrad.addColorStop(0, `rgba(138, 35, 135, ${this.opacity})`);
                        radGrad.addColorStop(0.5, `rgba(233, 64, 87, ${this.opacity * 0.4})`);
                        radGrad.addColorStop(1, 'rgba(0,0,0,0)');
                        ctx.fillStyle = radGrad;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.fill();
                        return;
                    case 'bubbles':
                        ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                        ctx.stroke();
                        return;
                    default:
                        ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                }
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / densityDivider;
            if (numberOfParticles > 600) numberOfParticles = 600; 
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.globalCompositeOperation = (currentParticleStyle === 'actual-fire' || currentParticleStyle === 'plasma') ? 'screen' : 'source-over';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let audioMod = 0;
            if (audioToggle.checked && isAudioSetup && dataArray) {
                analyser.getByteFrequencyData(dataArray);
                
                const band = audioBandSelect.value;
                const gain = parseFloat(audioGainSlider.value);
                let start = 0; let end = dataArray.length;
                
                if (band === 'bass') { start = 0; end = Math.floor(dataArray.length * 0.2); }
                else if (band === 'mid') { start = Math.floor(dataArray.length * 0.2); end = Math.floor(dataArray.length * 0.7); }
                else if (band === 'treble') { start = Math.floor(dataArray.length * 0.7); end = dataArray.length; }
                
                let sum = 0; let count = 0;
                for(let i = start; i < end; i++) { sum += dataArray[i]; count++; }
                let average = sum / (count || 1);
                audioMod = (average / 255) * gain;
            }

            if (particlesEnabled) {
                for (let i = 0; i < particlesArray.length; i++) {
                    particlesArray[i].update(audioMod);
                    particlesArray[i].draw();
                }
            }
            requestAnimationFrame(animateParticles);
        }

        // Initialize Runtime Pipeline
        restoreMemory();
        initParticles();
        animateParticles();
        runMasterChronometerPipeline();
    </script>
</body>
</html>
